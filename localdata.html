<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Mellomlagrede spill</title>
    <link rel="icon" href="images/mars.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

<h1>Mellomlagrede spill</h1>

<p>
    <a href="index.html">← Tilbake</a>
</p>

<table id="localTable">
    <thead>
        <tr>
            <th>Dato</th>
            <th>Spill</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<div class="button-row">
    <button type="button" class="primary-btn" id="copyGamesBtn">Kopier spill</button>
    <button type="button" style="margin-left: auto;" class="secondary-btn" onclick="resetData(); renderLocalGamesTable();">Nullstill mellomlagret data</button>
</div>

    <script src="js/data.js"></script>

<script>
    function renderLocalGamesTable() {
        const storedLocalGames = JSON.parse(
            localStorage.getItem("tm_local_games") || "[]"
        );

        storedLocalGames.sort((a, b) => {
            const da = new Date(a?.[0]?.timestamp || 0);
            const db = new Date(b?.[0]?.timestamp || 0);
            return db - da;
        });

        const tbody = document.querySelector("#localTable tbody");
        tbody.innerHTML = "";

        if (!storedLocalGames.length) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="2" class="empty-message">
                        Ingen mellomlagrede spill funnet.
                    </td>
                </tr>
            `;
            return;
        }

        storedLocalGames.forEach(game => {
            const tr = document.createElement("tr");

            const timestamp = game?.[0]?.timestamp || "";

            const gameData = game
                .map(p => `${p.player} (${p.points} - ${p.corporation})`)
                .join(", ");

            tr.innerHTML = `
                <td>${timestamp}</td>
                <td>${gameData}</td>
            `;

            tbody.appendChild(tr);
        });
    }

    function resetLocalDataAndRefresh() {
        if (!confirm("Er du sikker? Alle lokalt lagrede spill slettes.")) {
            return;
        }

        localStorage.removeItem("tm_local_games");
        localStorage.removeItem("selectedYear");

        renderLocalGamesTable();
    }

    renderLocalGamesTable();

    async function copyGames() {
        try {
            const storedLocalGames = JSON.parse(localStorage.getItem("tm_local_games")) || [];
            const clipboardText = storedLocalGames[0]
                .map(localGame =>
                    `${localGame.timestamp};${localGame.player};${localGame.corporation};${localGame.points}`
                )
                .join("\n");

            await navigator.clipboard.writeText(clipboardText);

            alert("Spillene er kopiert til utklippstavlen.");
        } catch (err) {
            console.error(err);
            alert("Kunne ikke kopiere spillene.");
        }
    }

    document.getElementById("copyGamesBtn").addEventListener("click", copyGames);


</script>

</body>
</html>
