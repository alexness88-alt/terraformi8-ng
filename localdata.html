<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Mellomlagrede spill</title>
    <link rel="icon" href="images/mars.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Mellomlagrede spill</h1>

<p>
    <a href="index.html">← Tilbake</a>
</p>

<table id="localTable">
    <thead>
        <tr>
            <th>Dato</th>
            <th>Spill</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="button-row">
    <button type="button" class="primary-btn" onclick="copyLocalData();">Kopier spill</button>
    <button type="button" class="secondary-btn" onclick="resetLocalData();">Nullstill mellomlagret data</button>
    <!-- <button type="button" style="margin-left: auto;" class="secondary-btn" onclick="resetLocalData(); renderPage();">Nullstill mellomlagret data</button> -->
</div>

    <script src="js/rating.js"></script>
    <script src="js/data.js"></script>
    <script src="js/tables.js"></script>

<script>

// -------------------- RENDER --------------------

function renderPage() {
    buildList("localTable",localGames);
}


// -------------------- INIT --------------------

async function initPage() {
    try {
        localGames = loadLocalGames();
        localGames = sortGamesByTimestamp(localGames);
        renderPage();
    } catch (error) {
        console.error("Feil ved initialisering av siden:", error);

        const localGamesBody = document.querySelector("#localTable tbody");

        if (localGamesBody) {
            localGamesBody.innerHTML = `
                <tr>
                    <td colspan="5" style="color:red;">Kunne ikke laste data.</td>
                </tr>
            `;
        }
    }
}

initPage();

</script>

</body>
</html>
