<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Terraforming Mars</title>
    <link rel="icon" href="images/mars.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <h1>Terraforming Mars</h1>

    <div class="filter-container">
        <div class="select-wrapper">
            <select id="yearFilter"></select>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="rankingChart"></canvas>
    </div>

    <table id="statsTable">
        <thead>
            <tr>
                <th>Plass</th>
                <th>Spiller</th>
                <th>Rating</th>
                <th>Spill</th>
                <th>Seire</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    
    <div style="display: flex; padding: 20px;">
        <a href="gamelist.html" style="margin-left: auto;">
            Se alle spill →
        </a>
    </div>

    <h2>Corporation Ranking</h2>

    <div class="chart-container">
        <canvas id="corpChart"></canvas>
    </div>

    <table id="corpTable">
        <thead>
            <tr>
                <th>Plass</th>
                <th>Corporation</th>
                <th>Rating</th>
                <th>Spill</th>
                <th>Seire</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="game-entry-card">

        <h3>🎲 Registrer nytt spill</h3>

        <input id="timestamp" type="datetime-local">
        <table id="entryTable">
            <thead>
                <tr>
                    <th>Spiller</th>
                    <th>Corporation</th>
                    <th>Poeng</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="entryBody"></tbody>
        </table>

        <div class="button-row">
            <div class="button-row">
                <button type="button" class="primary-btn" onclick="addGame()">Lagre spill</button>
                <button type="button" class="secondary-btn" onclick="addPlayerRow()">➕ Legg til spiller</button>
            </div>
        </div>
    </div>

    <div style="display: flex; padding: 20px;">
        <a href="localdata.html" style="margin-left: auto;">
            Se mellomlagret data →
        </a>
    </div>

    <datalist id="corporationSuggestions"></datalist>
    <datalist id="playerSuggestions"></datalist>

    <script src="js/data.js"></script>
    <script src="js/tables.js"></script>
    <script src="js/rating.js"></script>
    <script src="js/chart.js"></script>

    <script>

// -------------------- RENDER --------------------

let players = [];
let corps = [];

function renderPage() {
    updateCorporationSuggestions();
    updatePlayerSuggestions();

    const ranking = buildRankings(filteredGames);
    players = ranking.players;
    corps = ranking.corps;

    buildTable("statsTable", players);
    buildTable("corpTable", corps);

    destroyCharts();
    rankingChartInstance = buildChart("rankingChart", players, playerColors, true);
    corpChartInstance = buildChart("corpChart", corps, {}, false);

    if (rankingChartInstance) {
        setTimeout(() => celebrateTopBar(rankingChartInstance), 1200);
    }
    console.log(`Page rendered`);
}


// -------------------- INIT --------------------

async function initPage() {
    try {
        await loadAllGames();
        setupYearFilter();
        applyYearFilter();
        setupEntryForm();
        renderPage();
    } catch (error) {
        console.error("Feil ved initialisering av siden:", error);

        const statsBody = document.querySelector("#statsTable tbody");
        const corpBody = document.querySelector("#corpTable tbody");

        if (statsBody) {
            statsBody.innerHTML = `
                <tr>
                    <td colspan="5" style="color:red;">Kunne ikke laste data.</td>
                </tr>
            `;
        }

        if (corpBody) {
            corpBody.innerHTML = `
                <tr>
                    <td colspan="5" style="color:red;">Kunne ikke laste data.</td>
                </tr>
            `;
        }
    }
}

initPage();

    </script>

</body>
</html>
