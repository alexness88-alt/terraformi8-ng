table {

    background: white;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 40px;

th {

.button-row button {

    border-radius: 10px;

}

.button-row button:first-child {

}

.button-row .secondary {

}

#entryTable input {

    box-sizing: border-box;
    padding: 8px;
}

.secondary {

}

#yearFilter {
    appearance: none;
    background: white;
    border: none;
    padding: 12px 40px 12px 16px;
    border-radius: 999px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
}

#yearFilter:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,0,0,.12);
}

#yearFilter:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(37,99,235,.15);
}

.filter-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.select-wrapper {
    position: relative;
}

.select-wrapper::after {
    content: "⌄";
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #666;
    font-size: 18px;
}

.empty-state {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    color: #666;
    margin-bottom: 30px;
}
</style>

<script>
// -------------------- SETTINGS --------------------
const PRIOR_GAMES = 10;
const PRIOR_RATING = 50;

let rankingChartInstance = null;
let corpChartInstance = null;

// -------------------- HELPERS --------------------
function parseDate(value) {
    if (!value) return null;
    return new Date(String(value).replace(" ", "T"));
}

function parsePoints(value) {
    if (value === null || value === undefined) return NaN;
    return Number(String(value).trim().replace(",", "."));
}

function formatTimestampForStorage(value) {
    return String(value || "").trim();
}

// -------------------- LOAD --------------------
function loadGames() {
    try {
        const local = localStorage.getItem("games");
        if (local) {
            const parsed = JSON.parse(local);
            if (Array.isArray(parsed)) return parsed;
        }
    } catch (e) {
        console.warn("Kunne ikke lese localStorage-data. Faller tilbake til CSV.", e);
    }

    const csv = document.getElementById("csv-data").textContent.trim();
    const rows = csv.split("\n").slice(1); // hopper over header

    const gamesByTimestamp = {};

    rows.forEach(r => {
        if (!r.trim()) return;

        const parts = r.split(";");
        if (parts.length < 4) return;

        const [timestampRaw, playerRaw, corpRaw, pointsRaw] = parts;

        const timestamp = timestampRaw.trim();
        const player = playerRaw.trim();
        const corporation = corpRaw.trim();
        const points = parsePoints(pointsRaw);

        if (!timestamp || !player || !corporation || Number.isNaN(points)) return;

        if (!gamesByTimestamp[timestamp]) {
            gamesByTimestamp[timestamp] = [];
        }

        gamesByTimestamp[timestamp].push({
            player,
            corporation,
            points,
            timestamp
        });
    });

    return Object.values(gamesByTimestamp);
}

let allGames = loadGames();
let filteredGames = [...allGames];

// -------------------- FILTER --------------------
function setupYearFilter() {
    const select = document.getElementById("yearFilter");

    const years = [...new Set(
        allGames
            .map(g => g?.[0]?.timestamp)
            .filter(Boolean)
            .map(ts => parseDate(ts))
            .filter(d => d instanceof Date && !Number.isNaN(d.getTime()))
            .map(d => d.getFullYear())
    )].sort((a, b) => a - b);

    select.innerHTML =
        '<option value="all">Alle år</option>' +
        years.map(y => `<option value="${y}">${y}</option>`).join("");

    const selected = localStorage.getItem("selectedYear") || "all";
    select.value = years.includes(Number(selected)) || selected === "all" ? selected : "all";

    filteredGames = select.value === "all"
        ? [...allGames]
        : allGames.filter(g => {
            const d = parseDate(g?.[0]?.timestamp);
            if (!d || Number.isNaN(d.getTime())) return false;
            return d.getFullYear().toString() === select.value;
        });

    select.addEventListener("change", () => {
        localStorage.setItem("selectedYear", select.value);
        location.reload();
    });
}

setupYearFilter();

// -------------------- SAVE --------------------
function saveGames() {
    localStorage.setItem("games", JSON.stringify(allGames));
}

// -------------------- ADD GAME --------------------
function addPlayerRow(player = "", corp = "", points = "") {
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>
            <input class="player" value="${player}">
        </td>
        <td>
            <input class="corp" value="${corp}">
        </td>
        <td>
            <input class="points" type="number" step="0.1" value="${points}">
        </td>
        <td>
            <button type="button" onclick="this.closest('tr').remove()">❌</button>
        </td>
    `;

    document.getElementById("entryBody").appendChild(row);
}

function addGame() {
    const timestamp = formatTimestampForStorage(
        document.getElementById("timestamp").value
    );

    if (!timestamp) {
        alert("Velg dato/tid");
        return;
    }

    const rows = document.querySelectorAll("#entryBody tr");
    const game = [];

    rows.forEach(row => {
        const player = row.querySelector(".player").value.trim();
        const corporation = row.querySelector(".corp").value.trim();
        const pointsRaw = row.querySelector(".points").value.trim();
        const points = parsePoints(pointsRaw);

        if (!player || !corporation || pointsRaw === "" || Number.isNaN(points)) {
            return;
        }

        game.push({
            player,
            corporation,
            points,
            timestamp
        });
    });

    if (game.length < 2) {
        alert("Minst to spillere må registreres");
        return;
    }

    allGames.push(game);
    saveGames();
    location.reload();
}

for (let i = 0; i < 4; i++) {
    addPlayerRow();
}

// -------------------- RESET --------------------
function resetData() {
    if (!confirm("Er du sikker? Alle lokalt lagrede spill slettes.")) {
        return;
    }

    localStorage.removeItem("games");
    localStorage.removeItem("selectedYear");
    location.reload();
}

// -------------------- SORT GAMES --------------------
filteredGames.sort((a, b) => {
    const da = parseDate(a?.[0]?.timestamp);
    const db = parseDate(b?.[0]?.timestamp);
    return da - db;
});

// -------------------- STATS --------------------
const playerStats = {};
const corpStats = {};

function processGames() {
    filteredGames.forEach(game => {
        const sortedGame = [...game].sort((a, b) => b.points - a.points);
        const n = sortedGame.length;

        sortedGame.forEach((p, i) => {
            const perf = n === 1 ? 100 : ((n - (i + 1)) / (n - 1)) * 100;

            if (!playerStats[p.player]) {
                playerStats[p.player] = { perf: [], wins: 0 };
            }

            playerStats[p.player].perf.push(perf);
            if (i === 0) playerStats[p.player].wins++;

            if (!corpStats[p.corporation]) {
                corpStats[p.corporation] = { perf: [], wins: 0 };
            }

            corpStats[p.corporation].perf.push(perf);
            if (i === 0) corpStats[p.corporation].wins++;
        });
    });
}

processGames();

// -------------------- STREAKS --------------------
function buildPlayerStreaks(games) {
    const streaks = {};
    const players = new Set();

    games.forEach(game => {
        game.forEach(p => players.add(p.player));
    });

    players.forEach(player => {
        let streak = 0;

        for (let i = games.length - 1; i >= 0; i--) {
            const sortedGame = [...games[i]].sort((a, b) => b.points - a.points);
            const participant = sortedGame.find(p => p.player === player);

            if (!participant) continue;

            const winner = sortedGame[0]?.player;
            if (winner === player) {
                streak++;
            } else {
                break;
            }
        }

        streaks[player] = streak;
    });

    return streaks;
}

function buildCorporationStreaks(games) {
    const streaks = {};
    const corporations = new Set();

    games.forEach(game => {
        game.forEach(p => corporations.add(p.corporation));
    });

    corporations.forEach(corp => {
        let streak = 0;

        for (let i = games.length - 1; i >= 0; i--) {
            const sortedGame = [...games[i]].sort((a, b) => b.points - a.points);
            const participant = sortedGame.find(p => p.corporation === corp);

            if (!participant) continue;

            const winnerCorp = sortedGame[0]?.corporation;
            if (winnerCorp === corp) {
                streak++;
            } else {
                break;
            }
        }

        streaks[corp] = streak;
    });

    return streaks;
}

const playerStreaks = buildPlayerStreaks(filteredGames);
const corpStreaks = buildCorporationStreaks(filteredGames);

// -------------------- RANKING --------------------
function calculateRank(stats, streaks) {
    const out = [];

    Object.entries(stats).forEach(([name, d]) => {
        if (!d.perf.length) return;

        const avg = d.perf.reduce((a, b) => a + b, 0) / d.perf.length;
        const rating =
            (avg * d.perf.length + PRIOR_RATING * PRIOR_GAMES) /
            (d.perf.length + PRIOR_GAMES);

        out.push({
            name,
            rating,
            games: d.perf.length,
            wins: d.wins,
            streak: streaks[name] || 0
        });
    });

    return out.sort((a, b) => b.rating - a.rating);
}

const players = calculateRank(playerStats, playerStreaks);
const corps = calculateRank(corpStats, corpStreaks);

// -------------------- CHART COLORS --------------------
const playerColors = {
    "Alexander": "#59a14f",
    "Nhat": "#f28e2b",
    "Paul": "#edc948",
    "Anton": "#000000"
};

const fallbackColors = [
    "#4e79a7",
    "#e15759",
    "#76b7b2",
    "#b07aa1",
    "#ff9da7",
    "#9c755f",
    "#bab0ab",
    "#59a14f",
    "#f28e2b",
    "#edc948"
];

// -------------------- AVATARS --------------------
const avatars = {};
const defaultAvatar = new Image();
defaultAvatar.src = "images/default.png";

function getAvatar(player) {
    if (!avatars[player]) {
        const img = new Image();

        img.onload = () => {
            if (rankingChartInstance) {
                rankingChartInstance.update();
            }
        };

        img.onerror = () => {
            avatars[player] = defaultAvatar;
            if (rankingChartInstance) {
                rankingChartInstance.update();
            }
        };

        img.src = `images/${player.toLowerCase()}.png`;
        avatars[player] = img;
    }

    return avatars[player];
}

const avatarPlugin = {
    id: "avatarPlugin",

    afterDatasetsDraw(chart) {
        const { ctx } = chart;
        const meta = chart.getDatasetMeta(0);

        meta.data.forEach((bar, i) => {
            const player = chart.data.labels[i];
            const img = getAvatar(player);

            if (!img || !img.complete || img.naturalWidth === 0) {
                return;
            }

            const size = Math.max(bar.width * 0.8, 24);

            ctx.save();

            ctx.beginPath();
            ctx.arc(
                bar.x,
                bar.y - size / 2 - 8,
                size / 2,
                0,
                Math.PI * 2
            );
            ctx.closePath();
            ctx.clip();

            ctx.drawImage(
                img,
                bar.x - size / 2,
                bar.y - size - 8,
                size,
                size
            );

            ctx.restore();
        });
    }
};

// -------------------- CONFETTI --------------------
function celebrateTopBar(chart) {
    const meta = chart.getDatasetMeta(0);
    if (!meta?.data?.length) return;

    let highestBar = meta.data[0];
    let highestValue = chart.data.datasets[0].data[0];

    meta.data.forEach((bar, i) => {
        const value = chart.data.datasets[0].data[i];
        if (value > highestValue) {
            highestValue = value;
            highestBar = bar;
        }
    });

    const canvas = chart.canvas;
    const rect = canvas.getBoundingClientRect();

    const x = (rect.left + highestBar.x) / window.innerWidth;
    const y = (rect.top + highestBar.y + 20) / window.innerHeight;

    confetti({
        particleCount: 150,
        spread: 120,
        startVelocity: 60,
        origin: { x, y }
    });
}

// -------------------- BUILD CHART --------------------
function buildChart(id, data, colorMap = {}, useAvatarPlugin = false) {
    const el = document.getElementById(id);
    if (!el) return null;

    const dataset = data.slice(0, 5);
    dataset.sort((a, b) => a.name.localeCompare(b.name, "no"))

    return new Chart(el, {
        type: "bar",
        plugins: useAvatarPlugin ? [avatarPlugin] : [],
        data: {
            labels: dataset.map(x => x.name),
            datasets: [{
                label: "Bayesian Rating",
                data: dataset.map(x => Number(x.rating.toFixed(1))),
                backgroundColor: dataset.map((x, i) => {
                    const key = x.name;
                    return colorMap[key] || fallbackColors[i % fallbackColors.length];
                })
            }]
        },
        options: {
            responsive: true,
            animation: {
                duration: 1800,
                easing: "easeOutQuart"
            },
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    });
}

rankingChartInstance = buildChart("rankingChart", players, playerColors, true);
corpChartInstance = buildChart("corpChart", corps, {}, false);

if (rankingChartInstance) {
    setTimeout(() => celebrateTopBar(rankingChartInstance), 1200);
}


// -------------------- BUILD TABLES --------------------
function buildTable(id, data) {
    const tbody = document.querySelector(`#${id} tbody`);
    if (!tbody) return;

    tbody.innerHTML = "";

    if (!data.length) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td colspan="5" style="color:#666;">Ingen data for valgt filter</td>
        `;
        tbody.appendChild(tr);
        return;
    }

    data.forEach((x, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${x.name} ${x.streak >= 2 ? "🔥" + x.streak : ""}</td>
            <td>${x.rating.toFixed(1)}</td>
            <td>${x.games}</td>
            <td>${x.wins}</td>
        `;
        tbody.appendChild(tr);
    });
}

buildTable("statsTable", players);
buildTable("corpTable", corps);
</script>
