    <h1>Terraforming Mars</h1>

    <div class="filter-container">
        <div class="select-wrapper">
            <select id="yearFilter"></select>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="rankingChart"></canvas>
    </div>

    <table id="statsTable">
        <thead>
            <tr>
                <th>Plass</th>
                <th>Spiller</th>
                <th>Rating</th>
                <th>Spill</th>
                <th>Seire</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Corporation Ranking</h2>

        <canvas id="corpChart"></canvas>
    </div>

                <th>Corporation</th>
                <th>Rating</th>
                <th>Spill</th>
                <th>Seire</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="game-entry-card">

        <h3>🎲 Registrer nytt spill</h3>

        <input id="timestamp" type="datetime-local">
        <table id="entryTable">
            <thead>
                <tr>
                    <th>Spiller</th>
                    <th>Corporation</th>
                    <th>Poeng</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="entryBody"></tbody>
        </table>
        <div class="button-row">
            <div class="button-row">
                <button type="button" class="primary-btn" onclick="addGame()">Lagre spill</button>
                <button type="button" class="secondary-btn" onclick="addPlayerRow()">➕ Legg til spiller</button>
            </div>
            <!-- <button type="button" style="margin-left: auto;" class="secondary-btn" onclick="resetData()">Nullstill mellomlagret data</button> -->
            <!-- <a href="localdata.html" class="secondary-btn" style="margin-left: auto; text-decoration: none; color: inherit;">Se mellomlagret data</a> -->
        </div>
    </div>
    <div style="display: flex; padding: 20px;">
        <a href="localdata.html" style="margin-left: auto;">
            Se mellomlagret data →

    </div>
