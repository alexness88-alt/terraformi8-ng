<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Terraforming Mars</title>
    <link rel="icon" href="images\mars.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <h1>Terraforming Mars</h1>

    <div class="filter-container">
        <div class="select-wrapper">
            <select id="yearFilter"></select>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="rankingChart"></canvas>
    </div>

    <table id="statsTable">
        <thead>
            <tr>
                <th>Plass</th>
                <th>Spiller</th>
                <th>Rating</th>
                <th>Spill</th>
                <th>Seire</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Corporation Ranking</h2>

    <div class="chart-container">
        <canvas id="corpChart"></canvas>
    </div>

    <table id="corpTable">
        <thead>
            <tr>
                <th>Plass</th>
                <th>Corporation</th>
                <th>Rating</th>
                <th>Spill</th>
                <th>Seire</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="game-entry-card">

        <h3>🎲 Registrer nytt spill</h3>

        <input id="timestamp" type="datetime-local">
        <table id="entryTable">
            <thead>
                <tr>
                    <th>Spiller</th>
                    <th>Corporation</th>
                    <th>Poeng</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="entryBody"></tbody>
        </table>
        <div class="button-row">
            <div class="button-row">
                <button type="button" class="primary-btn" onclick="addGame()">Lagre spill</button>
                <button type="button" class="secondary-btn" onclick="addPlayerRow()">➕ Legg til spiller</button>
            </div>
            <button type="button" style="margin-left: auto;" class="secondary-btn" onclick="resetData()">Nullstill mellomlagret data</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/rating.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
